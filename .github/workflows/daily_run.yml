name: 📚 Daily UK Car Recommendations

on:
  schedule:
    - cron: "0 18 * * *"   # Every day at 06 PM UTC
  workflow_dispatch:        # Manual trigger button

jobs:
  run-agent:
    name: Fetch car listings
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── Install UV ──────────────────────────────────────
      - name: ⚡ Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true          # caches .venv between runs

      # ── Set up Python via UV ─────────────────────────────
      - name: 🐍 Set up Python 3.12
        run: uv python install 3.12

      # ── Install dependencies via UV ──────────────────────
      - name: 📦 Install dependencies
        run: uv sync                  # reads pyproject.toml + uv.lock

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxshmfence1 \
            xvfb

      - name: Install Playwright browsers
        run: uv run python -m playwright install chromium

      - name: Verify Playwright install
        run: uv run python -m playwright --version

      # ── Run the agent ────────────────────────────────────
      - name: 🤖 Run Car Recommendations Agent
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python main.py   # runs inside UV's venv